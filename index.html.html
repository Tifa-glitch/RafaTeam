<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>拉法業務分析儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;font-size:14px}
header{background:#1a1a1a;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:700;letter-spacing:.04em}
header span{font-size:11px;color:#888;margin-left:auto}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e3df;padding:0 20px;overflow-x:auto}
.tab{padding:11px 16px;font-size:13px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.tab.chain-tab.active{color:#534AB7;border-bottom-color:#534AB7}
.page{display:none;padding:18px 20px;max-width:1280px}
.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.mc{background:#fff;border-radius:8px;padding:11px 13px;border:1px solid #e5e3df}
.ml{font-size:11px;color:#888;margin-bottom:3px}
.mv{font-size:20px;font-weight:700}
.ms{font-size:11px;margin-top:2px}
.up{color:#2a9d5c}.down{color:#e05252}.neu{color:#888}
.chart-card{background:#fff;border-radius:8px;padding:14px;border:1px solid #e5e3df}
.card-label{font-size:11px;color:#888;margin-bottom:10px;font-weight:500}
.row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.flex1{flex:1;min-width:200px}
.flex2{flex:2;min-width:300px}
.flex15{flex:1.5;min-width:240px}
/* Salesperson grid */
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:14px}
.sp-card{background:#fff;padding:10px 12px;border-radius:8px;border:1px solid #e5e3df;cursor:pointer;transition:all .15s;border-left-width:3px}
.sp-card:hover{border-color:#aaa}
.sp-card.sel{border-top-width:2px;border-right-width:2px;border-bottom-width:2px}
.sp-name{font-size:13px;font-weight:700;margin-bottom:2px}
.sp-meta{font-size:11px;color:#888}
.sp-yoy{font-size:11px;margin-top:3px}
/* Controls */
.ctrl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input[type=text],select{font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid #d5d3cf;background:#fff;color:#1a1a1a;outline:none}
input[type=text]:focus,select:focus{border-color:#888}
.sb{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #d5d3cf;cursor:pointer;background:#fff;color:#666;transition:all .1s}
.sb.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.count{font-size:11px;color:#888;margin-bottom:6px}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e3df}
thead tr{background:#f5f4f0}
th{padding:7px 9px;text-align:left;font-weight:500;font-size:11px;color:#666;border-bottom:1px solid #e5e3df}
td{padding:6px 9px;border-bottom:1px solid #f0eeea;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8;cursor:pointer}
.cpill{font-family:monospace;font-size:10px;background:#f0eeea;padding:1px 5px;border-radius:3px}
.pill{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500}
.pill-up{background:#e8f5ee;color:#1a7a42}
.pill-dn{background:#fdeaea;color:#c0392b}
/* Chain page layout */
.chain-layout{display:flex;gap:12px;align-items:flex-start}
.chain-left{width:340px;flex-shrink:0}
.chain-right{flex:1;min-width:0}
/* Customer rows */
.cust-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid #e5e3df;border-radius:6px;cursor:pointer;margin-bottom:4px;background:#fff;transition:all .12s}
.cust-row:hover{border-color:#aaa;background:#fafaf8}
.cust-row.csel{border-color:#534AB7;border-width:1.5px;background:#f8f7ff}
.cust-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cust-name{font-size:12px;font-weight:500;flex:1;color:#1a1a1a}
.cust-val{font-size:11px;color:#888;margin-right:4px}
/* Sparkline */
.spark{display:flex;align-items:flex-end;gap:1px;height:22px;flex-shrink:0}
.spark-bar{width:5px;border-radius:1px 1px 0 0;min-height:1px}
/* Trend detail */
.trend-header{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.trend-name{font-size:15px;font-weight:700}
.trend-sub{font-size:11px;color:#888}
</style>
</head>
<body>
<header>
  <h1>拉法業務分析儀表板</h1>
  <span>2017–2026 · 9位業務 · 傳統店＋連鎖通路</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab(0)">整體概覽</div>
  <div class="tab" onclick="showTab(1)">業務 × 區域（傳統店）</div>
  <div class="tab" onclick="showTab(2)">區域年趨勢</div>
  <div class="tab chain-tab" onclick="showTab(3)">連鎖通路</div>
</div>

<!-- ===== PAGE 0: 整體概覽 ===== -->
<div id="p0" class="page active">
  <div class="metrics" id="ov-metrics"></div>
  <div class="row">
    <div class="chart-card flex2">
      <div class="card-label">全公司年度業績 — 傳統店 vs 連鎖通路（千元）</div>
      <div style="position:relative;height:230px"><canvas id="ov-bar"></canvas></div>
    </div>
    <div class="chart-card flex1">
      <div class="card-label">各業務員 2025 YoY 比較</div>
      <div style="position:relative;height:230px"><canvas id="ov-yoy"></canvas></div>
    </div>
  </div>
  <div class="row">
    <div class="chart-card flex1">
      <div class="card-label">傳統店累計佔比</div>
      <div style="position:relative;height:200px"><canvas id="ov-pie1"></canvas></div>
    </div>
    <div class="chart-card flex1">
      <div class="card-label">連鎖通路累計佔比</div>
      <div style="position:relative;height:200px"><canvas id="ov-pie2"></canvas></div>
    </div>
  </div>
</div>

<!-- ===== PAGE 1: 業務×區域 ===== -->
<div id="p1" class="page">
  <div class="sp-grid" id="trad-sp-grid"></div>
  <div id="trad-drill" style="display:none">
    <div class="ctrl">
      <input type="text" id="trad-search" placeholder="搜尋地名或區號…" style="flex:1;min-width:120px" oninput="renderTradTable()">
      <select id="trad-city" onchange="renderTradTable()"><option value="">全部縣市</option></select>
      <button class="sb active" id="tsTotal" onclick="setTradSort('total')">總計↓</button>
      <button class="sb" id="tsYoy" onclick="setTradSort('yoy')">YoY↓</button>
      <button class="sb" id="tsDiff" onclick="setTradSort('diff')">差額↓</button>
    </div>
    <div class="count" id="trad-count"></div>
    <div style="overflow-x:auto;margin-bottom:12px">
      <table><thead><tr><th>#</th><th>區號</th><th>縣市</th><th>鄉鎮區</th><th>累計</th><th>2024</th><th>2025</th><th>差額</th><th>YoY</th></tr></thead><tbody id="trad-tbody"></tbody></table>
    </div>
    <div class="chart-card">
      <div class="card-label" id="trad-mini-label"></div>
      <div style="position:relative;height:160px"><canvas id="trad-mini"></canvas></div>
    </div>
  </div>
</div>

<!-- ===== PAGE 2: 區域年趨勢 ===== -->
<div id="p2" class="page">
  <div class="ctrl">
    <select id="cmp-sp" onchange="loadCmpRegions()"><option value="">選業務員</option></select>
    <select id="cmp-region" onchange="drawCmpChart()"><option value="">選區域</option></select>
  </div>
  <div class="chart-card">
    <div class="card-label" id="cmp-label">選擇業務員與區域後顯示趨勢</div>
    <div style="position:relative;height:250px"><canvas id="cmp-chart"></canvas></div>
  </div>
  <div class="metrics" id="cmp-stats" style="margin-top:12px"></div>
</div>

<!-- ===== PAGE 3: 連鎖通路 ===== -->
<div id="p3" class="page">
  <div class="sp-grid" id="chain-sp-grid"></div>
  <div id="chain-drill" style="display:none">
    <div class="chain-layout">
      <!-- 左側客戶列表 -->
      <div class="chain-left">
        <div class="ctrl">
          <input type="text" id="chain-search" placeholder="搜尋客戶…" style="flex:1" oninput="renderChainCustomers()">
          <button class="sb active" id="csTotal" onclick="setChainSort('total')">累計↓</button>
          <button class="sb" id="csYoy" onclick="setChainSort('yoy')">YoY↓</button>
        </div>
        <div class="count" id="chain-count"></div>
        <div id="chain-cust-list"></div>
      </div>
      <!-- 右側趨勢 -->
      <div class="chain-right" id="chain-trend-area">
        <div style="padding:40px 20px;text-align:center;color:#888;font-size:13px">← 點選左側客戶查看年度趨勢</div>
      </div>
    </div>
  </div>
</div>

  const tradYoys=TRAD_SP_NAMES.map(sp=>{const a=tradSpY24(sp),b=tradSpY25(sp);return a>0?Math.round((b-a)/a*1000)/10:0;});
  const chainYoys=TRAD_SP_NAMES.map(sp=>{
    const csp=sp==='缺區-桃竹'?'桃園缺區':sp==='汪智廷'?'汪志廷':sp;
    const a=chainSpY24(csp),b=chainSpY25(csp);return a>0?Math.round((b-a)/a*1000)/10:0;
  });
  dc('ov-yoy');
  charts['ov-yoy']=new Chart(document.getElementById('ov-yoy'),{type:'bar',data:{labels:yoyLabels,datasets:[
    {label:'傳統店',data:tradYoys,backgroundColor:tradYoys.map(v=>v>=0?'#3266ad88':'#e0525288'),borderWidth:0},
    {label:'連鎖',data:chainYoys,backgroundColor:chainYoys.map(v=>v>=0?'#534AB788':'#e0525288'),borderWidth:0}
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:8,padding:6}},tooltip:{callbacks:{label:c=>(c.parsed.x>=0?'+':'')+c.parsed.x+'%'}}},scales:{x:{ticks:{callback:v=>v+'%',font:{size:10}}},y:{ticks:{font:{size:11}}}}}});

  // Pie charts
  const colors=TRAD_SP_NAMES.map(sp=>spColor(sp));
  dc('ov-pie1');
  charts['ov-pie1']=new Chart(document.getElementById('ov-pie1'),{type:'doughnut',data:{labels:TRAD_SP_NAMES,datasets:[{data:TRAD_SP_NAMES.map(tradSpTot),backgroundColor:colors,borderWidth:2,borderColor:'#f5f4f0'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:5}},tooltip:{callbacks:{label:c=>c.label+': '+fmtM(c.parsed)}}}}});
  dc('ov-pie2');
  charts['ov-pie2']=new Chart(document.getElementById('ov-pie2'),{type:'doughnut',data:{labels:CHAIN_SP_NAMES,datasets:[{data:CHAIN_SP_NAMES.map(chainSpTot),backgroundColor:CHAIN_SP_NAMES.map(spColor),borderWidth:2,borderColor:'#f5f4f0'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:5}},tooltip:{callbacks:{label:c=>c.label+': '+fmtM(c.parsed)}}}}});
}

// ═══════════════ PAGE 1: TRAD DRILL ═══════════════
let tradSelSp=null, tradSortKey='total', tradSortDir={total:-1,yoy:-1,diff:-1};

function initTradDrill(){
  document.getElementById('trad-sp-grid').innerHTML=TRAD_SP_NAMES.map(sp=>{
    const tot=tradSpTot(sp),a=tradSpY24(sp),b=tradSpY25(sp),yoy=a>0?(b-a)/a*100:0;
    const c=spColor(sp);
    return `<div class="sp-card${tradSelSp===sp?' sel':''}" id="tsc_${sp}" onclick="selectTradSp('${sp}')" style="border-left-color:${c}${tradSelSp===sp?';border-top-color:'+c+';border-right-color:'+c+';border-bottom-color:'+c:''}">
      <div class="sp-name" style="color:${c}">${sp}</div>
      <div class="sp-meta">${(TRAD[sp]||[]).length}個區域 · ${fmtM(tot)}</div>
      <div class="sp-yoy ${yoy>=0?'up':'down'}">${yoy>=0?'+':''}${yoy.toFixed(1)}% 2025 YoY</div>
    </div>`;
  }).join('');
  if(tradSelSp) renderTradTable();
}

function selectTradSp(sp){
  tradSelSp=sp;
  document.getElementById('trad-drill').style.display='block';
  const cf=document.getElementById('trad-city');
  const cities=[...new Set((TRAD[sp]||[]).map(r=>r.city))].sort();
  cf.innerHTML='<option value="">全部縣市</option>'+cities.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('trad-search').value='';
  initTradDrill();
  renderTradTable();
  drawTradMini(sp);
}

function setTradSort(k){
  if(tradSortKey===k)tradSortDir[k]*=-1;else{tradSortKey=k;tradSortDir[k]=-1;}
  ['Total','Yoy','Diff'].forEach(s=>{const b=document.getElementById('ts'+s);if(b)b.classList.toggle('active',s.toLowerCase()===k);});
  renderTradTable();
}

function renderTradTable(){
  if(!tradSelSp)return;
  const q=(document.getElementById('trad-search').value||'').toLowerCase();
  const cf=document.getElementById('trad-city').value;
  let data=(TRAD[tradSelSp]||[]).filter(r=>(!q||(r.city+r.dist+r.r).toLowerCase().includes(q))&&(!cf||r.city===cf));
  data=[...data].sort((a,b)=>{const av=tradSortKey==='yoy'?(a.yoy??-999):a[tradSortKey];const bv=tradSortKey==='yoy'?(b.yoy??-999):b[tradSortKey];return(bv-av)*tradSortDir[tradSortKey];});
  document.getElementById('trad-count').textContent=tradSelSp+' · 顯示 '+data.length+' / '+(TRAD[tradSelSp]||[]).length+' 個區域';
  const c=spColor(tradSelSp);
  document.getElementById('trad-tbody').innerHTML=data.map((r,i)=>{
    const ys=r.yoy!=null?(r.yoy>=0?`<span class="pill pill-up">+${r.yoy}%</span>`:`<span class="pill pill-dn">${r.yoy}%</span>`):'—';
    const ds=r.diff>=0?`<span class="up">+${fmt(r.diff)}</span>`:`<span class="down">${fmt(r.diff)}</span>`;
    return `<tr onclick="goTradCmp('${tradSelSp}','${r.r}')"><td style="color:#aaa">${i+1}</td><td><span class="cpill">${r.r}</span></td><td>${r.city}</td><td>${r.dist}</td><td style="font-weight:500">${fmt(r.total)}</td><td>${fmt(r.y24)}</td><td>${fmt(r.y25)}</td><td>${ds}</td><td>${ys}</td></tr>`;
  }).join('');
}

function drawTradMini(sp){
  document.getElementById('trad-mini-label').textContent=sp+' 年度業績走勢（點擊列可查看該區趨勢）';
  dc('trad-mini');
  const tots=YEARS.map((_,i)=>(TRAD[sp]||[]).reduce((s,r)=>s+r.yearly[i],0));
  const c=spColor(sp);
  charts['trad-mini']=new Chart(document.getElementById('trad-mini'),{type:'line',data:{labels:YEARS,datasets:[{data:tots,borderColor:c,backgroundColor:c+'22',fill:true,borderWidth:2,tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>fmt(v.parsed.y)+'K'}}},scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{ticks:{callback:v=>Math.round(v/1000)+'M',font:{size:10}}}}}});
}

function goTradCmp(sp,r){showTab(2);document.getElementById('cmp-sp').value=sp;loadCmpRegions();document.getElementById('cmp-region').value=r;drawCmpChart();}

// ═══════════════ PAGE 2: REGION TREND ═══════════════
function initCmpPage(){
  const s=document.getElementById('cmp-sp');
  if(s.options.length===1)TRAD_SP_NAMES.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  if(tradSelSp){s.value=tradSelSp;loadCmpRegions();}
}
function loadCmpRegions(){
  const sp=document.getElementById('cmp-sp').value;
  const rs=document.getElementById('cmp-region');
  rs.innerHTML='<option value="">選區域</option>';
  if(!sp)return;
  [...(TRAD[sp]||[])].sort((a,b)=>b.total-a.total).forEach(r=>{const o=document.createElement('option');o.value=r.r;o.textContent=r.r+' '+r.city+r.dist;rs.appendChild(o);});
}
function drawCmpChart(){
  const sp=document.getElementById('cmp-sp').value,rc=document.getElementById('cmp-region').value;
  if(!sp||!rc)return;
  const r=(TRAD[sp]||[]).find(x=>x.r===rc);if(!r)return;
  document.getElementById('cmp-label').textContent=r.city+r.dist+'（'+r.r+'）年度趨勢';
  dc('cmp-chart');
  const col=spColor(sp);
  charts['cmp-chart']=new Chart(document.getElementById('cmp-chart'),{type:'bar',data:{labels:YEARS,datasets:[{data:r.yearly,backgroundColor:r.yearly.map((_,i)=>i===8?col:col+'88'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)+'K'}}},scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{ticks:{callback:v=>Math.round(v/1000)+'M',font:{size:10}}}}}});
  const yoy=r.yoy!=null?`<span class="${r.yoy>=0?'up':'down'}">${r.yoy>=0?'+':''}${r.yoy}%</span>`:'—';
  document.getElementById('cmp-stats').innerHTML=`
    <div class="mc"><div class="ml">累計</div><div class="mv" style="font-size:16px">${fmt(r.total)}</div></div>
    <div class="mc"><div class="ml">2024</div><div class="mv" style="font-size:16px">${fmt(r.y24)}</div></div>
    <div class="mc"><div class="ml">2025</div><div class="mv" style="font-size:16px">${fmt(r.y25)}</div></div>
    <div class="mc"><div class="ml">YoY</div><div class="mv" style="font-size:16px">${yoy}</div><div class="ms neu">差額 ${r.diff>=0?'+':''}${fmt(r.diff)}</div></div>`;
}

// ═══════════════ PAGE 3: CHAIN ═══════════════
let chainSelSp=null, chainSelCust=null, chainSortKey='total', chainSortDir={total:-1,yoy:-1};

function initChainPage(){
  document.getElementById('chain-sp-grid').innerHTML=CHAIN_SP_NAMES.map(sp=>{
    const custs=CHAIN[sp].customers;
    const y24=custs.reduce((s,c)=>s+c.y24,0),y25=custs.reduce((s,c)=>s+c.y25,0);
    const yoy=y24>0?(y25-y24)/y24*100:0;
    const tot=custs.reduce((s,c)=>s+c.total,0);
    const c=spColor(sp);
    return `<div class="sp-card${chainSelSp===sp?' sel':''}" id="csc_${sp}" onclick="selectChainSp('${sp}')" style="border-left-color:${c}${chainSelSp===sp?';border-top-color:'+c+';border-right-color:'+c+';border-bottom-color:'+c:''}">
      <div class="sp-name" style="color:${c}">${sp}</div>
      <div class="sp-meta">${custs.length}個客戶 · ${fmtM(tot)}</div>
      <div class="sp-yoy ${yoy>=0?'up':'down'}">${yoy>=0?'+':''}${yoy.toFixed(1)}% 2025 YoY</div>
    </div>`;
  }).join('');
  if(chainSelSp) renderChainCustomers();
}

function selectChainSp(sp){
  chainSelSp=sp; chainSelCust=null;
  document.getElementById('chain-drill').style.display='block';
  document.getElementById('chain-search').value='';
  document.getElementById('chain-trend-area').innerHTML='<div style="padding:40px 20px;text-align:center;color:#888;font-size:13px">← 點選左側客戶查看年度趨勢</div>';
  initChainPage();
  renderChainCustomers();
}

function setChainSort(k){
  if(chainSortKey===k)chainSortDir[k]*=-1;else{chainSortKey=k;chainSortDir[k]=-1;}
  ['Total','Yoy'].forEach(s=>{const b=document.getElementById('cs'+s);if(b)b.classList.toggle('active',s.toLowerCase()===k);});
  renderChainCustomers();
}

function sparkSVG(yearly, color){
  const pos=yearly.filter(v=>v>0);
  if(!pos.length) return '';
  const mx=Math.max(...yearly);
  return '<div class="spark">'+yearly.map((v,i)=>{
    const h=mx>0?Math.max(2,Math.round(v/mx*22)):2;
    const op=i===8?'1':i===7?'0.7':'0.45';
    return `<div class="spark-bar" style="height:${h}px;background:${color};opacity:${op}"></div>`;
  }).join('')+'</div>';
}

function renderChainCustomers(){
  if(!chainSelSp)return;
  const q=(document.getElementById('chain-search').value||'').toLowerCase();
  let custs=[...CHAIN[chainSelSp].customers].filter(c=>!q||c.name.toLowerCase().includes(q));
  custs.sort((a,b)=>{
    if(chainSortKey==='total') return (b.total-a.total)*chainSortDir.total;
    const ay=a.y24>0?(a.y25-a.y24)/a.y24*100:-999;
    const by=b.y24>0?(b.y25-b.y24)/b.y24*100:-999;
    return (by-ay)*chainSortDir.yoy;
  });
  const col=spColor(chainSelSp);
  document.getElementById('chain-count').textContent=chainSelSp+' · '+custs.length+' 個客戶';
  document.getElementById('chain-cust-list').innerHTML=custs.map(c=>{
    const yoy=c.y24>0?(c.y25-c.y24)/c.y24*100:null;
    const yoyStr=yoy!=null?(yoy>=0?`<span class="pill pill-up">+${yoy.toFixed(0)}%</span>`:`<span class="pill pill-dn">${yoy.toFixed(0)}%</span>`):'—';
    return `<div class="cust-row${chainSelCust===c.name?' csel':''}" onclick="selectChainCust('${chainSelSp}','${c.name}')">
      <div class="cust-dot" style="background:${col}"></div>
      ${sparkSVG(c.yearly, col)}
      <div class="cust-name">${c.name}</div>
      <div class="cust-val">${fmtK(c.y25)}</div>
      ${yoyStr}
    </div>`;
  }).join('');
}

function selectChainCust(sp, name){
  chainSelCust=name;
  renderChainCustomers();
  const c=CHAIN[sp].customers.find(x=>x.name===name);
  if(!c)return;
  const col=spColor(sp);
  const y24=c.y24, y25=c.y25;
  const yoy=y24>0?(y25-y24)/y24*100:null;
  const yoyStr=yoy!=null?(yoy>=0?`<span class="${yoy>=0?'up':'down'}">+${yoy.toFixed(1)}%</span>`:`<span class="down">${yoy.toFixed(1)}%</span>`):'—';
  document.getElementById('chain-trend-area').innerHTML=`
    <div class="chart-card" style="margin-bottom:10px">
      <div class="trend-header">
        <div class="trend-name">${c.name}</div>
        <div class="trend-sub">累計 ${fmtM(c.total)} ｜ 負責業務：${sp}</div>
      </div>
      <div style="position:relative;height:200px"><canvas id="chain-trend-chart"></canvas></div>
    </div>
    <div class="metrics">
      <div class="mc"><div class="ml">累計業績</div><div class="mv" style="font-size:15px">${fmtM(c.total)}</div></div>
      <div class="mc"><div class="ml">2024</div><div class="mv" style="font-size:15px">${fmtK(y24)}</div></div>
      <div class="mc"><div class="ml">2025</div><div class="mv" style="font-size:15px">${fmtK(y25)}</div></div>
      <div class="mc"><div class="ml">2025 YoY</div><div class="mv" style="font-size:15px">${yoyStr}</div></div>
    </div>`;
  setTimeout(()=>{
    dc('chain-trend-chart');
    charts['chain-trend-chart']=new Chart(document.getElementById('chain-trend-chart'),{type:'bar',data:{labels:YEARS,datasets:[{data:c.yearly,backgroundColor:c.yearly.map((_,i)=>i===8?col:col+'88'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>fmt(v.parsed.y)}}},scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{ticks:{callback:v=>fmtM(v),font:{size:10}}}}}});
  },50);
}

// ═══════════════ TAB ROUTING ═══════════════
function showTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',j===i));
  if(i===0) initOverview();
  else if(i===1) initTradDrill();
  else if(i===2) initCmpPage();
  else if(i===3) initChainPage();
}
initOverview();
</script>
</body>
</html>
